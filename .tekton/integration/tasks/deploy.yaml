apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: deploy-container
spec:
  params:
    - name: serviceaccount-secret
      description: "Secret to service account that can access the ephemeral namespace"
    - name: SNAPSHOT
      description: The JSON string of the Snapshot under test
    - name: pod-name
      description: Name of the pod and service to be tested
  steps:
    - name: deploy-container
      image: registry.redhat.io/openshift4/ose-cli:latest
      imagePullPolicy: Always
      env:
        - name: COMPONENT_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['appstudio.openshift.io/component']
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: SECRETNAME
          value: $(params.serviceaccount-secret)
        - name: PODNAME
          value: $(params.pod-name)
      script: |
        #!/bin/bash
        set -ex
        set -o pipefail

        # get and set kubeconfig
        oc get secret $SECRETNAME --template '{{.data.kubeconfig}}' | base64 -d > /kubeconfig
        export KUBECONFIG=/kubeconfig

        dnf install -y jq gettext

        export COMPONENT_CONTAINER_IMAGE=$(jq -r --arg component_name "${COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .containerImage' <<< "${SNAPSHOT}")
        echo "Component container image: ${COMPONENT_CONTAINER_IMAGE}"

        echo "Deploying pod and service..."
        curl https://raw.githubusercontent.com/jencull/rh-trex/main/.tekton/integration/pod-and-svc.yaml | envsubst | oc apply -f -

        echo "Waiting for the pod to be ready..."
        oc wait --for=condition=Ready pod/$PODNAME --timeout=120s

        # Quick connectivity test using curl from a debug pod
        echo "Testing connectivity to the pod using curl (DNS resolution)..."
        if ! oc run -i --tty --rm debug --image=curlimages/curl --restart=Never -- curl ${PODNAME}:8000; then
          echo "Initial connectivity test to ${PODNAME}:8000 failed. Proceeding with debugging steps..."
        fi

        echo "Creating a ClusterIP service for the pod..."
        oc create service clusterip $PODNAME --tcp=8000:8000

        # Debugging pod and service
        echo "Debugging pod and service configuration..."
        oc describe pod/$PODNAME
        oc describe svc/$PODNAME
        oc get endpoints/$PODNAME
        oc logs pod/$PODNAME
        oc exec pod/$PODNAME -- ss -tuln || echo "ss command failed"

        # Retrieve ClusterIP and construct the service URL
        CLUSTER_IP=$(oc get svc $PODNAME -o jsonpath='{.spec.clusterIP}')
        export HOST_URL=http://$CLUSTER_IP:8000
        echo "Host URL: ${HOST_URL}"

        # Debugging information collection
        echo "Gathering debugging information..."
        oc get --kubeconfig /kubeconfig events
        oc describe --kubeconfig /kubeconfig pod -l app=trex
        oc logs --kubeconfig /kubeconfig -l app=trex

        # Test connectivity to the ClusterIP URL
        echo "Testing service connectivity using ClusterIP..."
        if ! curl -v $HOST_URL; then
          echo "Failed to connect to ${HOST_URL}. Debugging required."
        fi

        # Run any additional DAST scans or tests
        echo "Running DAST scan against: ${HOST_URL}"
        curl -v "${HOST_URL}"      