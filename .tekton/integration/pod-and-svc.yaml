apiVersion: v1
kind: Pod
metadata:
  name: $PODNAME
  labels:
    app: trex
spec:
  containers:
    - name: trex
      image: $COMPONENT_CONTAINER_IMAGE
      ports:
        - containerPort: 8000
      command: ["/bin/sh"]
      args: ["-c", "sleep 3600"]
  

---

apiVersion: v1
kind: Service
metadata:
  name: $PODNAME
spec:
  selector:
    app: trex
  ports:
    - protocol: TCP
      port: 8000 
      targetPort: 8000 
