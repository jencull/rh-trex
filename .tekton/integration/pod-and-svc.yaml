apiVersion: v1
kind: Pod
metadata:
  name: $PODNAME
  labels:
    app: rh-trex
spec:
  containers:
    - name:  rh-trex
      image: $COMPONENT_CONTAINER_IMAGE
      ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: rh-trex
spec:
  selector:
    app: rh-trex
  ports:
    - protocol: TCP
      port: 8000        # External port
      targetPort: 8000  # Port inside the container
