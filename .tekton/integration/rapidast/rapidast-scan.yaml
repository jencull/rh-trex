apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: rapidast-scan
spec:
  params:
    - name: SERVICEACCOUNT
      description: "Secret to service account that can access the ephemeral namespace"
    - name: SERVICENAME
      description: "Service URL of the application to be scanned"
  steps:
    - name: setup-kubeconfig
      image: quay.io/redhatproductsecurity/rapidast:latest
      script: |
        #!/bin/bash
        set -ex
        set -o pipefail

        # Get kubeconfig from the service account secret
        oc get secret $(params.SERVICEACCOUNT) --template '{{.data.kubeconfig}}' | base64 -d > /kubeconfig
        export KUBECONFIG=/kubeconfig
        echo "Kubeconfig setup completed."

    - name: generate-config
      image: quay.io/redhatproductsecurity/rapidast:latest
      script: |
        #!/bin/bash
        set -ex
        set -o pipefail

        echo "Generating RapiDAST configuration..."
        cat <<EOF > /workspace/config.yaml
        config:
          configVersion: 5
        application:
          shortName: "my-application"
          url: "${HOST_URL}"
        scanners:
          zap:
            apiScan:
              apis:
                apiUrl: "http://$(params.SERVICENAME):8000/api/v1/swagger.json"
        EOF
        echo "RapiDAST configuration generated."

    - name: run-rapidast
      image: quay.io/redhatproductsecurity/rapidast:latest
      script: |
        #!/bin/bash
        set -ex
        set -o pipefail

        echo "Starting RapiDAST scan..."
        podman run -v /workspace/config.yaml:/opt/rapidast/config/config.yaml:Z quay.io/redhatproductsecurity/rapidast:latest ./rapidast.py --config /opt/rapidast/config/config.yaml

        echo "RapiDAST scan completed. Results are being collected..."
        mkdir -p /workspace/results
        podman run -v /workspace/results:/opt/rapidast/results:Z quay.io/redhatproductsecurity/rapidast:latest cp /opt/rapidast/results/* /workspace/results/

    - name: process-results
      image: quay.io/redhatproductsecurity/rapidast:latest
      script: |
        #!/bin/bash
        set -ex
        set -o pipefail

        echo "Processing scan results..."
        ls -l /workspace/results
        echo "Results processed and available in /workspace/results."
    - name: analyze-results
      image: quay.io/redhatproductsecurity/rapidast:latest
      script: |
        #!/bin/bash
        set -ex
        set -o pipefail

        echo "Analyzing scan results..."
        if jq '.alerts[] | select(.risk >= 3)' /workspace/results/scan-output.json; then
          echo "High-risk issues found in the scan results!"
          exit 1
        else
          echo "No high-risk issues found."
        fi
